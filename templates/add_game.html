{% extends "base.html" %}

{% block title %}Welcome{% endblock %}

{% block content %}

    <h1>Add Game</h1>

    <form method="POST">
        <input type="text" name="title" placeholder="Enter game name" required>
        <input type="text" name="genre" placeholder="Enter game genre" required>
        <input type="text" name="platform" placeholder="Enter game platform" required>
        
        <input type="number" name="rating" placeholder="Enter game rating (0.0 - 5.0)" min="0" max="5" step="0.1" required>
        
        <textarea name="description" placeholder="Enter game description (Optional)"></textarea>
        
        <input type="number" name="release_year" placeholder="Enter release year" min="1950" max="2026" required>
        
        <input type="url" name="image_url" placeholder="Enter cover art image URL (https://...)">
        <input type="text" name="creator" placeholder="Enter developer studio name" required>
        
        <input type="text" name="price" placeholder="Enter price (e.g., $14.99 or Free to Play)" required>
        
        <button type="submit">Add Game</button>
    </form>

{% endblock %}
