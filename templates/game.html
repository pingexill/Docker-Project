{% extends "base.html" %}

{% block title %}Welcome{% endblock %}

{% block content %}

    <img src="{{ game[7] }}" alt="{{ game[1] }} image" style="max-width: 300px;">
    
    <h1>{{ game[1] }}</h1>
    <p><strong>Genre:</strong> {{ game[2] }}</p>
    <p><strong>Platform:</strong> {{ game[3] }}</p>
    <p><strong>Rating:</strong> {{ game[4] }} / 5</p>
    <p><strong>Release Year:</strong> {{ game[6] }}</p>
    <p><strong>Description:</strong> {{ game[5] }}</p>

    <p><strong>Creator:</strong> {{ game[8] }}</p>
    <p><strong>Price:</strong> {{ game[9] }}</p>

    <form method="POST" action="/delete_game/{{ game[0] }}">
        <button type="submit">Delete Game</button>
    </form>
{% endblock %}
